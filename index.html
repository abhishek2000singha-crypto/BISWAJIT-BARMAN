<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REELS KING</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: black; color: white; font-family: sans-serif;">
        <div style="text-align: center;">
          <div id="loading-spinner" style="width: 40px; height: 40px; border: 3px solid #f43f5e; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
          <p id="loading-text" style="opacity: 0.5; font-size: 14px;">Loading REELS KING...</p>
        </div>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      // Early error tracking
      window.onerror = function(message, source, lineno, colno, error) {
        console.error("Critical Load Error:", message, error);
        const root = document.getElementById('root');
        if (root) {
          const isApiKeyError = message.toString().toLowerCase().includes('api key');
          const errorTitle = isApiKeyError ? 'Missing API Configuration' : 'App Load Error';
          const errorColor = isApiKeyError ? '#f59e0b' : '#f43f5e';
          
          root.innerHTML = '<div style="padding: 40px; color: white; background: #000; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">' +
            '<div style="max-width: 500px; width: 100%;">' +
            '<h1 style="color: ' + errorColor + '; margin-bottom: 15px; font-size: 24px;">' + errorTitle + '</h1>' +
            '<p style="margin-bottom: 25px; opacity: 0.9; line-height: 1.6;">' + message + '</p>' +
            (isApiKeyError ? 
              '<div style="background: #1c1917; padding: 20px; border-radius: 12px; border: 1px solid #444; margin-bottom: 25px; text-align: left;">' +
              '<p style="font-size: 14px; margin-bottom: 10px; color: #fbbf24;">Action Required:</p>' +
              '<ol style="font-size: 13px; color: #ccc; padding-left: 20px; line-height: 1.8;">' +
              '<li>Go to your Netlify Dashboard</li>' +
              '<li>Site settings > Environment variables</li>' +
              '<li>Add <b>GEMINI_API_KEY</b> with your Google AI key</li>' +
              '<li>Trigger a new deploy</li>' +
              '</ol>' +
              '</div>' : 
              '<div style="background: #111; padding: 15px; border-radius: 8px; overflow: auto; max-height: 30vh; text-align: left; margin-bottom: 25px;">' +
              '<pre style="font-size: 11px; color: #888; margin: 0; white-space: pre-wrap;">' + (error && error.stack ? error.stack : 'No stack trace available') + '</pre>' +
              '</div>'
            ) +
            '<button onclick="window.location.reload()" style="background: ' + errorColor + '; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: opacity 0.2s;">Retry Loading</button>' +
            '</div>' +
            '</div>';
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
